<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Weather</title>
<meta name="theme-color" content="#213b4a" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23305b6b'/%3E%3Cpath d='M9 20a4 4 0 0 1 .6-7.95A5 5 0 0 1 19 12a3.5 3.5 0 0 1 .3 7z' fill='none' stroke='%23f2d49b' stroke-width='1.8' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  :root{
    --sky-1:#2f5d74;--sky-2:#3d7089;--sky-3:#6ea6b8;
    --spruce:#1f4b44;--spruce-2:#2e6a60;--sage:#7bb0a4;
    --honey:#e6b45a;--honey-deep:#d89a2e;--clay:#c1714c;
    --oat:#f2ede2;--card:#ffffff;--ink:#1f2724;--muted:#5d6b66;--faint:#93a19b;
    --line:rgba(20,40,34,.12);--r:20px;--r-sm:13px;
    --ease:cubic-bezier(.2,.7,.2,1);--shadow:0 20px 50px -24px rgba(15,40,34,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:#0e1a1f;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
  #frame{position:relative;width:100%;max-width:440px;height:100dvh;max-height:940px;margin:0 auto;
    background:var(--oat);overflow:hidden;box-shadow:var(--shadow)}
  @media(min-width:520px){body{display:flex;align-items:center;justify-content:center;padding:20px}
    #frame{border-radius:34px;border:1px solid rgba(255,255,255,.08)}}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;
    transform:translateY(8px);transition:opacity .4s var(--ease),transform .4s var(--ease)}
  .screen.on{opacity:1;pointer-events:auto;transform:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,textarea{font-family:inherit}

  /* ===== WEATHER DECOY ===== */
  #weather{background:linear-gradient(180deg,var(--sky-1),var(--sky-2) 46%,var(--sky-3));color:#eef6f7}
  .wx-scroll{flex:1;overflow-y:auto;padding:calc(env(safe-area-inset-top) + 26px) 22px 26px;display:flex;flex-direction:column}
  .wx-loc{display:flex;align-items:center;gap:8px;font-size:15px;opacity:.92}
  .wx-loc svg{width:16px;height:16px}
  .wx-date{font-size:13px;opacity:.62;margin-top:2px}
  .wx-now{margin-top:20px;display:flex;align-items:flex-start;gap:6px}
  .wx-temp{font-size:104px;font-weight:200;line-height:.9;letter-spacing:-.04em;user-select:none}
  .wx-temp sup{font-size:34px;font-weight:300;top:-.9em}
  .wx-cond{margin-top:2px;font-size:19px;font-weight:500;opacity:.95}
  .wx-hl{font-size:14px;opacity:.7;margin-top:4px}
  .wx-icon{margin-left:auto;opacity:.9}.wx-icon svg{width:96px;height:96px}
  .wx-stats{display:flex;gap:10px;margin-top:26px}
  .wx-stat{flex:1;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.14);border-radius:var(--r-sm);padding:13px 14px}
  .wx-stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.7}
  .wx-stat .v{font-size:20px;font-weight:500;margin-top:5px}
  .wx-fc-label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;opacity:.66;margin:30px 0 12px}
  .wx-fc{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .wx-day{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.13);border-radius:15px;padding:15px 6px;text-align:center;transition:transform .12s var(--ease),background .2s;user-select:none}
  .wx-day:active{transform:scale(.94);background:rgba(255,255,255,.2)}
  .wx-day .d{font-size:12px;opacity:.8;font-weight:600}
  .wx-day svg{width:30px;height:30px;margin:9px 0;opacity:.92}
  .wx-day .t{font-size:14px;font-weight:600}.wx-day .t small{opacity:.55;font-weight:400}
  .wx-foot{margin-top:auto;padding-top:24px;text-align:center;font-size:11px;opacity:.4}

  /* ===== VAULT ===== */
  #vault{background:radial-gradient(130% 90% at 50% 0%,#20423c,#152a27 70%);color:var(--oat);align-items:center;justify-content:center;padding:30px}
  .vault-card{width:100%;max-width:340px;text-align:center}
  .vault-badge{width:58px;height:58px;border-radius:17px;margin:0 auto 20px;background:linear-gradient(150deg,var(--spruce-2),var(--spruce));display:grid;place-items:center;box-shadow:0 12px 30px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12)}
  .vault-badge svg{width:28px;height:28px;color:var(--honey)}
  .vault-card h1{font-size:25px;font-weight:600;margin:0}
  .vault-card p{font-size:13.5px;color:var(--sage);margin:7px 0 26px}
  .field{text-align:left;margin-bottom:13px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--sage);margin-left:3px}
  .field input{width:100%;margin-top:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:13px;padding:14px 15px;color:var(--oat);font-size:16px;outline:none;transition:border-color .18s,background .18s}
  .field input:focus{border-color:var(--honey);background:rgba(255,255,255,.09)}
  .field input::placeholder{color:rgba(242,237,226,.35)}
  .vbtn{width:100%;margin-top:8px;background:var(--honey);color:#3a2708;font-weight:700;font-size:16px;padding:15px;border-radius:13px;transition:transform .15s var(--ease),opacity .2s;box-shadow:0 10px 26px -10px rgba(230,180,90,.7)}
  .vbtn:active{transform:scale(.98)}.vbtn[disabled]{opacity:.6;pointer-events:none}
  .vmsg{min-height:18px;font-size:13px;margin-top:14px;color:var(--clay)}
  .vhost{font-size:11px;color:var(--faint);margin-top:18px;word-break:break-all}
  .vback{position:absolute;top:calc(env(safe-area-inset-top) + 14px);left:16px;font-size:14px;color:var(--sage);display:flex;align-items:center;gap:6px;padding:8px}
  .vback svg{width:16px;height:16px}

  /* ===== APP ===== */
  #app{background:var(--oat)}
  .top{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;background:var(--spruce);color:var(--oat);flex:none}
  .top .title{font-weight:600;font-size:17px;display:flex;flex-direction:column;line-height:1.2;min-width:0}
  .top .title span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .title small{font-size:11.5px;font-weight:400;color:var(--sage);display:flex;align-items:center;gap:5px}
  .top .title small svg{width:11px;height:11px}
  .icbtn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--oat);background:rgba(255,255,255,.08);transition:background .15s;flex:none}
  .icbtn:active{background:rgba(255,255,255,.2)}.icbtn svg{width:19px;height:19px}
  .body{flex:1;overflow-y:auto;background:var(--oat)}

  .rooms{padding:6px 0}
  .room{display:flex;align-items:center;gap:13px;padding:13px 16px;transition:background .15s;cursor:pointer}
  .room:active{background:rgba(31,75,68,.06)}
  .room .av{width:48px;height:48px;border-radius:15px;flex:none;display:grid;place-items:center;font-weight:700;font-size:17px;color:#fff;background:linear-gradient(140deg,var(--spruce-2),var(--sage))}
  .room .meta{flex:1;min-width:0}
  .room .meta .n{font-weight:600;font-size:16px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .room .meta .p{font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .room .t{font-size:11.5px;color:var(--faint);align-self:flex-start;margin-top:3px}
  .empty{padding:60px 30px;text-align:center;color:var(--muted)}
  .empty svg{width:44px;height:44px;color:var(--sage);opacity:.6;margin-bottom:14px}
  .empty .h{font-weight:600;color:var(--ink);font-size:16px}.empty p{font-size:14px;margin-top:6px}

  .convo{display:flex;flex-direction:column;min-height:100%;padding:14px 12px 6px;justify-content:flex-end}
  .row{display:flex;flex-direction:column;margin-top:9px;max-width:82%}
  .row.me{align-self:flex-end;align-items:flex-end}.row.them{align-self:flex-start;align-items:flex-start}
  .msg{padding:9px 13px;border-radius:16px;font-size:15px;line-height:1.4;word-wrap:break-word;overflow-wrap:anywhere;
    background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;box-shadow:0 1px 2px rgba(20,40,34,.05);position:relative;cursor:pointer}
  .row.me .msg{background:linear-gradient(150deg,var(--spruce-2),var(--spruce));color:#eef6f2;border-color:transparent;border-bottom-left-radius:16px;border-bottom-right-radius:5px}
  .msg .s{font-size:12px;font-weight:600;color:var(--spruce-2);margin-bottom:3px}
  .msg .tm{font-size:10.5px;color:var(--faint);margin-top:3px;text-align:right}
  .row.me .msg .tm{color:rgba(238,246,242,.65)}
  .msg.deleted{font-style:italic;opacity:.6;font-size:13.5px}
  .quote{border-left:3px solid var(--honey);padding:3px 9px;margin-bottom:6px;background:rgba(31,75,68,.06);border-radius:0 8px 8px 0;font-size:13px}
  .row.me .quote{background:rgba(255,255,255,.13)}
  .quote .qs{font-weight:600;font-size:12px;color:var(--spruce-2)}.row.me .quote .qs{color:var(--honey)}
  .quote .qb{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
  .msg img.photo{display:block;max-width:230px;width:100%;border-radius:11px;margin:1px 0 2px;background:rgba(0,0,0,.05);min-height:60px}
  /* audio */
  .voice{display:flex;align-items:center;gap:10px;min-width:172px}
  .vplay{width:36px;height:36px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--spruce-2);color:#fff}
  .row.me .vplay{background:rgba(255,255,255,.22)}
  .vplay svg{width:16px;height:16px}
  .vwave{flex:1;height:24px;display:flex;align-items:center;gap:2px}
  .vwave i{flex:1;background:var(--sage);border-radius:2px;opacity:.5}
  .row.me .vwave i{background:rgba(255,255,255,.6)}
  .vdur{font-size:11.5px;color:var(--faint)}.row.me .vdur{color:rgba(238,246,242,.7)}
  /* reactions */
  .reacts{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .react{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12.5px;cursor:pointer;transition:transform .12s}
  .react:active{transform:scale(.9)}
  .react.mine{background:var(--spruce-soft,#e4ede9);border-color:var(--sage)}
  .react .c{color:var(--muted);font-weight:600}
  .daysep{align-self:center;font-size:11px;color:var(--faint);background:rgba(31,75,68,.07);padding:3px 12px;border-radius:999px;margin:12px 0 4px}
  .typing{align-self:flex-start;margin:8px 4px 2px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .typing .dots{display:flex;gap:3px}.typing .dots i{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:bl 1.2s infinite}
  .typing .dots i:nth-child(2){animation-delay:.2s}.typing .dots i:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* reply preview bar */
  .replybar{display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border-top:1px solid var(--line)}
  .replybar.on{display:flex}
  .replybar .rl{flex:1;min-width:0;border-left:3px solid var(--honey);padding-left:9px}
  .replybar .rl .n{font-size:12px;font-weight:600;color:var(--spruce-2)}
  .replybar .rl .b{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .replybar .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
  .replybar .x svg{width:16px;height:16px}

  /* composer */
  .composer{display:flex;align-items:flex-end;gap:8px;padding:9px 10px calc(env(safe-area-inset-bottom) + 9px);background:var(--card);border-top:1px solid var(--line);flex:none}
  .cbtn{width:42px;height:42px;border-radius:50%;flex:none;display:grid;place-items:center;color:var(--spruce-2);transition:background .15s}
  .cbtn:active{background:rgba(31,75,68,.08)}.cbtn svg{width:22px;height:22px}
  .composer textarea{flex:1;resize:none;max-height:110px;border:1px solid var(--line);border-radius:20px;padding:10px 15px;font-size:15px;background:var(--oat);outline:none;line-height:1.35;color:var(--ink)}
  .composer textarea:focus{border-color:var(--sage)}
  .send,.mic{width:44px;height:44px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--honey);transition:transform .14s var(--ease);box-shadow:0 6px 16px -6px rgba(230,180,90,.7)}
  .send:active,.mic:active{transform:scale(.9)}
  .send svg,.mic svg{width:20px;height:20px;color:#3a2708}
  .hidden{display:none!important}

  /* emoji picker */
  .emojis{display:none;grid-template-columns:repeat(8,1fr);gap:2px;padding:10px 12px;background:var(--card);border-top:1px solid var(--line);max-height:190px;overflow-y:auto}
  .emojis.on{display:grid}
  .emojis button{font-size:22px;padding:6px 0;border-radius:8px;line-height:1}
  .emojis button:active{background:rgba(31,75,68,.08)}

  /* recording bar */
  .recbar{display:none;align-items:center;gap:12px;padding:11px 14px calc(env(safe-area-inset-bottom) + 11px);background:var(--card);border-top:1px solid var(--line);flex:none}
  .recbar.on{display:flex}
  .recbar .dot{width:11px;height:11px;border-radius:50%;background:var(--clay);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .recbar .rt{font-variant-numeric:tabular-nums;font-size:15px;color:var(--ink)}
  .recbar .lbl{color:var(--muted);font-size:13px;flex:1}
  .recbar .rcancel{color:var(--clay);font-weight:600;font-size:14px;padding:8px}
  .recbar .rsend{width:44px;height:44px;border-radius:50%;background:var(--honey);display:grid;place-items:center}
  .recbar .rsend svg{width:20px;height:20px;color:#3a2708}

  /* action sheet */
  .sheet-bg{position:absolute;inset:0;background:rgba(15,25,22,.42);opacity:0;pointer-events:none;transition:opacity .25s;z-index:30}
  .sheet-bg.on{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:10px;right:10px;bottom:10px;background:var(--card);border-radius:20px;transform:translateY(20px);opacity:0;pointer-events:none;transition:transform .28s var(--ease),opacity .25s;z-index:31;overflow:hidden;box-shadow:0 -10px 40px -12px rgba(0,0,0,.4)}
  .sheet.on{transform:none;opacity:1;pointer-events:auto}
  .sheet .quickr{display:flex;justify-content:space-around;padding:12px 8px;border-bottom:1px solid var(--line)}
  .sheet .quickr button{font-size:27px;padding:4px 8px;border-radius:12px;transition:transform .12s}
  .sheet .quickr button:active{transform:scale(1.25)}
  .sheet .act{display:flex;align-items:center;gap:14px;padding:15px 20px;font-size:16px;color:var(--ink);width:100%;text-align:left}
  .sheet .act:active{background:rgba(31,75,68,.06)}
  .sheet .act svg{width:20px;height:20px;color:var(--spruce-2)}
  .sheet .act.danger{color:var(--clay)}.sheet .act.danger svg{color:var(--clay)}

  .toast{position:absolute;left:50%;bottom:80px;transform:translateX(-50%) translateY(10px);opacity:0;background:var(--ink);color:var(--oat);font-size:13px;padding:9px 16px;border-radius:999px;pointer-events:none;transition:opacity .25s,transform .25s;z-index:40;max-width:90%;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .preview-tag{position:absolute;top:calc(env(safe-area-inset-top) + 10px);right:12px;z-index:15;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(0,0,0,.2);padding:3px 8px;border-radius:6px;pointer-events:none}
  /* ===== weather sky & realism ===== */
  #weather{position:relative}
  #weather .wx-scroll{position:relative;z-index:2}
  .sky{position:absolute;inset:0;z-index:0;overflow:hidden;transition:background 1s ease;background:linear-gradient(180deg,var(--sky-1),var(--sky-2) 46%,var(--sky-3))}
  .sky.dawn{background:linear-gradient(180deg,#3a4a6b,#8a6a7a 46%,#e0a878)}
  .sky.dusk{background:linear-gradient(180deg,#2b355c,#63496e 46%,#bd7a5e)}
  .sky.night{background:linear-gradient(180deg,#0d1730,#182842 55%,#26385a)}
  .sun{position:absolute;width:118px;height:118px;border-radius:50%;top:40px;right:34px;background:radial-gradient(circle,#fff6d0,#ffd873 52%,rgba(255,216,115,0) 72%);display:none;animation:glow 5s ease-in-out infinite}
  .sky.day .sun,.sky.dawn .sun,.sky.dusk .sun{display:block}
  .sky.dawn .sun,.sky.dusk .sun{top:118px;right:26px;background:radial-gradient(circle,#ffe6bc,#ff9d5c 52%,rgba(255,157,92,0) 72%)}
  .sun::before{content:"";position:absolute;inset:-34px;border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(255,244,196,.3) 0 5deg,transparent 5deg 17deg);-webkit-mask:radial-gradient(circle,transparent 57px,#000 60px);mask:radial-gradient(circle,transparent 57px,#000 60px);animation:spin 44s linear infinite}
  .moon{position:absolute;width:72px;height:72px;border-radius:50%;top:48px;right:42px;background:radial-gradient(circle at 64% 36%,#f6f8ff,#c8d2ea 72%);box-shadow:0 0 42px 8px rgba(200,215,255,.22);display:none;animation:glow 6s ease-in-out infinite}
  .sky.night .moon{display:block}
  .stars{position:absolute;inset:0;display:none}.sky.night .stars{display:block}
  .stars i{position:absolute;background:#fff;border-radius:50%;aspect-ratio:1;opacity:.7;animation:twinkle 3.2s ease-in-out infinite}
  .clouds{position:absolute;inset:0;overflow:hidden}
  .cloud{position:absolute;background:radial-gradient(ellipse at center,rgba(255,255,255,.9),rgba(255,255,255,0) 70%);filter:blur(7px);opacity:.5}
  .cloud.c1{width:190px;height:66px;top:96px;animation:drift 38s linear infinite}
  .cloud.c2{width:140px;height:52px;top:186px;opacity:.4;animation:drift 52s linear infinite;animation-delay:-14s}
  .cloud.c3{width:230px;height:82px;top:250px;opacity:.34;animation:drift 66s linear infinite;animation-delay:-30s}
  .sky.night .cloud{opacity:.16}
  .wx-icon{animation:floatY 4.5s ease-in-out infinite}
  .wx-hourly{display:flex;gap:8px;overflow-x:auto;margin-top:22px;padding-bottom:2px;scrollbar-width:none}
  .wx-hourly::-webkit-scrollbar{display:none}
  .hr{flex:0 0 auto;width:60px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.13);border-radius:15px;padding:11px 4px;text-align:center;transition:background .2s}
  .hr.now{background:rgba(255,255,255,.2)}
  .hr .hl{font-size:11.5px;opacity:.82}.hr svg{width:24px;height:24px;margin:7px 0}.hr .ht{font-size:14px;font-weight:600}
  .wxa{opacity:0;transform:translateY(14px);animation:fadeUp .55s var(--ease) forwards;animation-delay:calc(var(--d,0)*70ms)}
  /* ===== app motion ===== */
  .row.new{animation:popIn .34s var(--ease)}
  .room.ri{opacity:0;animation:fadeUp .5s var(--ease) forwards}
  #vault.on .vault-badge{animation:badgePop .55s var(--ease) both}
  .voice.playing .vwave i{animation:wavePlay .85s ease-in-out infinite}
  .voice.playing .vwave i:nth-child(2n){animation-delay:.12s}
  .voice.playing .vwave i:nth-child(3n){animation-delay:.26s}
  .voice.playing .vplay{background:var(--honey);color:#3a2708}
  @keyframes drift{from{transform:translateX(-260px)}to{transform:translateX(560px)}}
  @keyframes glow{0%,100%{transform:scale(1);opacity:.95}50%{transform:scale(1.05);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes fadeUp{to{opacity:1;transform:none}}
  @keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes slideInR{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  @keyframes badgePop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes wavePlay{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}

<script>
"use strict";
(function(){
  var HOMESERVER="https://143-110-180-166.sslip.io";
  var UNLOCK_SEQUENCE=[1,3,0];
  var EMOJIS=["😀","😄","😅","😂","🙂","😉","😍","😘","😎","🤔","🙃","😴","😢","😭","😡","🥺","👍","👎","👏","🙏","💪","🔥","🎉","✨","❤️","🧡","💛","💚","💙","💜","🤍","💔","✅","❌","⚠️","👀","🤝","🙌","😮","😱","🥳","😇","🤣","😊","👋","💯","☕","🌙"];
  var QUICK=["👍","❤️","😂","😮","😢","🙏"];
  var $=function(id){return document.getElementById(id);};
  $("vhost").textContent=HOMESERVER.replace("https://","");

  function show(id){["weather","vault","app"].forEach(function(s){$(s).classList.toggle("on",s===id);});}

  /* ---- weather ---- */
  var IC={sun:'<svg viewBox="0 0 24 24" fill="none" stroke="#ffe6a8" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>',
    cloud:'<svg viewBox="0 0 24 24" fill="none" stroke="#e6eef0" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1 .5-7.97A5 5 0 0 1 17 11a3.5 3.5 0 0 1 .3 7z"/></svg>',
    part:'<svg viewBox="0 0 24 24" fill="none" stroke="#ffe6a8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><path d="M8 2.5V4M3.5 8H5M4.8 4.8l1 1M11.2 4.8l-1 1"/><path stroke="#e6eef0" d="M9 19a3.5 3.5 0 0 1 .4-6.98A4.4 4.4 0 0 1 18 13a3 3 0 0 1 .2 6z"/></svg>',
    rain:'<svg viewBox="0 0 24 24" fill="none" stroke="#cfe0e6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 15a4 4 0 0 1 .5-7.97A5 5 0 0 1 17 8a3.5 3.5 0 0 1 .3 7z"/><path d="M8 19l-1 2M12 19l-1 2M16 19l-1 2"/></svg>',
    moon:'<svg viewBox="0 0 24 24" fill="none" stroke="#e2e8ff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 6.5 6.5 0 1 0 20 14.5z"/></svg>'};
  var days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  function initWeather(){
    var now=new Date();
    $("wxDate").textContent=now.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});
    var hr=now.getHours();
    var tod=(hr>=20||hr<5)?'night':(hr<8?'dawn':(hr<18?'day':'dusk'));
    $("sky").className='sky '+tod;
    $("wxIcon").innerHTML=(tod==='night')?IC.moon:IC.part;
    if(tod==='night'){var ss='';for(var k=0;k<42;k++){ss+='<i style="left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*62).toFixed(1)+'%;width:'+(1+Math.random()*1.6).toFixed(1)+'px;animation-delay:'+(Math.random()*3).toFixed(1)+'s"></i>';}$("stars").innerHTML=ss;}
    // temperature count-up
    var target=18,tn=$("wxTempN"),t0=null;
    function tick(ts){if(t0===null)t0=ts;var pr=Math.min((ts-t0)/900,1);tn.textContent=Math.round(target*pr);if(pr<1)requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
    // hourly strip
    var hi=['part','sun','sun','part','cloud','part','part','cloud'],hh="";
    for(var j=0;j<8;j++){var Hh=(hr+j)%24;var lbl=j===0?'Now':((Hh%12===0?12:Hh%12)+(Hh<12?'am':'pm'));var tmp=18+Math.round(Math.sin(j/2)*3);hh+='<div class="hr'+(j===0?' now':'')+'"><div class="hl">'+lbl+'</div>'+IC[hi[j]]+'<div class="ht">'+tmp+'°</div></div>';}
    $("wxHourly").innerHTML=hh;
    // 5-day forecast (secret unlock keypad)
    var base=[{k:'part',hi:21,lo:13},{k:'sun',hi:24,lo:14},{k:'cloud',hi:20,lo:12},{k:'rain',hi:17,lo:11},{k:'part',hi:22,lo:13}];
    var h="";for(var i=0;i<5;i++){var d=days[(now.getDay()+i)%7];h+='<div class="wx-day" data-i="'+i+'"><div class="d">'+(i===0?'Today':d)+'</div>'+IC[base[i].k]+'<div class="t">'+base[i].hi+'°<small> '+base[i].lo+'°</small></div></div>';}
    $("wxFc").innerHTML=h;
    var seq=[];
    $("wxFc").querySelectorAll(".wx-day").forEach(function(el){el.addEventListener("click",function(){
      seq.push(+el.getAttribute("data-i"));if(seq.length>UNLOCK_SEQUENCE.length)seq.shift();
      if(seq.length===UNLOCK_SEQUENCE.length&&seq.every(function(v,i){return v===UNLOCK_SEQUENCE[i];})){seq=[];openVault();}});});
    var t=$("wxTemp"),tm=null,stp=function(){tm=setTimeout(openVault,1100);},sp=function(){clearTimeout(tm);};
    t.addEventListener("mousedown",stp);t.addEventListener("touchstart",stp,{passive:true});
    ["mouseup","mouseleave","touchend","touchcancel"].forEach(function(e){t.addEventListener(e,sp);});
  }
  function openVault(){show("vault");setTimeout(function(){$("u").focus();},300);}
  $("vaultBack").addEventListener("click",function(){show("weather");});

  var tt;function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(tt);tt=setTimeout(function(){t.classList.remove("on");},2600);}

  /* ---- lean Matrix client ---- */
  var M={base:HOMESERVER,token:null,userId:null,since:null,rooms:{},order:[],syncing:false,current:null};
  function C(p){return M.base+"/_matrix/client/v3"+p;}
  function H(){return{"Authorization":"Bearer "+M.token,"Content-Type":"application/json"};}
  function AH(){return{"Authorization":"Bearer "+M.token};}
  function txn(){return "m"+Date.now()+Math.floor(Math.random()*99999);}

  async function login(u,p){
    var r=await fetch(C("/login"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"m.login.password",identifier:{type:"m.id.user",user:u},password:p})});
    var d=await r.json();if(!r.ok)throw new Error(d.error||("login "+r.status));M.token=d.access_token;M.userId=d.user_id;return d;}

  function nameOf(room,uid){return room.members[uid]||uid.split(":")[0].replace("@","");}
  function ingest(rid,data){
    var room=M.rooms[rid]||(M.rooms[rid]={id:rid,name:null,members:{},heroes:[],evs:{},order:[],reacts:{},reactEv:{},last:0,typing:[]});
    (data.state&&data.state.events||[]).forEach(function(ev){applyState(room,ev);});
    var sum=data.summary&&data.summary["m.heroes"];if(sum)room.heroes=sum;
    (data.timeline&&data.timeline.events||[]).forEach(function(ev){applyEvent(room,ev);});
    // typing (ephemeral)
    var eph=data.ephemeral&&data.ephemeral.events||[];
    eph.forEach(function(ev){if(ev.type==="m.typing"){room.typing=(ev.content.user_ids||[]).filter(function(u){return u!==M.userId;}).map(function(u){return nameOf(room,u);});}});
    room.display=room.name||(room.heroes.filter(function(h){return h!==M.userId;}).map(function(h){return nameOf(room,h);}).join(", "))||("Room");
    if(M.order.indexOf(rid)<0)M.order.push(rid);
  }
  function applyState(room,ev){
    if(ev.type==="m.room.name"&&ev.content)room.name=ev.content.name;
    if(ev.type==="m.room.member"&&ev.content&&ev.state_key)room.members[ev.state_key]=ev.content.displayname||ev.state_key.split(":")[0].replace("@","");
  }
  function applyEvent(room,ev){
    if(ev.type==="m.room.name"||ev.type==="m.room.member"){applyState(room,ev);return;}
    if(ev.type==="m.reaction"&&ev.content&&ev.content["m.relates_to"]){
      var rel=ev.content["m.relates_to"];if(rel.rel_type!=="m.annotation")return;
      var tgt=rel.event_id,key=rel.key;if(room.reactEv[ev.event_id])return;room.reactEv[ev.event_id]={tgt:tgt,key:key,sender:ev.sender};
      var m=room.reacts[tgt]||(room.reacts[tgt]={});var e=m[key]||(m[key]={count:0,mine:false,mineEv:null});
      e.count++;if(ev.sender===M.userId){e.mine=true;e.mineEv=ev.event_id;}return;}
    if(ev.type==="m.room.redaction"){
      var target=ev.redacts||(ev.content&&ev.content.redacts);if(!target)return;
      if(room.reactEv[target]){var re=room.reactEv[target];var mm=room.reacts[re.tgt];if(mm&&mm[re.key]){mm[re.key].count--;if(re.sender===M.userId){mm[re.key].mine=false;mm[re.key].mineEv=null;}if(mm[re.key].count<=0)delete mm[re.key];}delete room.reactEv[target];}
      if(room.evs[target])room.evs[target].deleted=true;return;}
    if(ev.type==="m.room.message"&&ev.content){
      if(room.evs[ev.event_id])return;
      var c=ev.content,kind="text",mxc=null,info=c.info||{};
      if(c.msgtype==="m.image"){kind="image";mxc=c.url;}
      else if(c.msgtype==="m.audio"){kind="audio";mxc=c.url;}
      else if(c.msgtype==="m.file"||c.msgtype==="m.video"){kind="file";mxc=c.url;}
      var reply=c["m.relates_to"]&&c["m.relates_to"]["m.in_reply_to"]&&c["m.relates_to"]["m.in_reply_to"].event_id||null;
      var msg={id:ev.event_id,kind:kind,sender:ev.sender,name:nameOf(room,ev.sender),body:c.body||"",ts:ev.origin_server_ts||Date.now(),mxc:mxc,info:info,reply:reply,voice:!!c["org.matrix.msc3245.voice"],deleted:false};
      room.evs[ev.event_id]=msg;room.order.push(ev.event_id);room.last=Math.max(room.last,msg.ts);
    }
  }
  async function syncOnce(timeout){
    var url=M.since?C("/sync")+"?timeout="+timeout+"&since="+encodeURIComponent(M.since):C("/sync")+"?timeout=0";
    var r=await fetch(url,{headers:AH()});if(!r.ok)throw new Error("sync "+r.status);
    var d=await r.json();M.since=d.next_batch;var j=d.rooms&&d.rooms.join||{};
    Object.keys(j).forEach(function(rid){ingest(rid,j[rid]);});return d;}
  async function syncLoop(){if(M.syncing)return;M.syncing=true;
    while(M.syncing){try{await syncOnce(30000);renderRooms();if(M.current){renderConvo(M.current);}}catch(e){await new Promise(function(r){setTimeout(r,3000);});}}}

  /* ---- send helpers ---- */
  async function sendMessage(rid,content){
    var r=await fetch(C("/rooms/"+encodeURIComponent(rid)+"/send/m.room.message/"+txn()),{method:"PUT",headers:H(),body:JSON.stringify(content)});
    if(!r.ok){var d=await r.json().catch(function(){return{};});throw new Error(d.error||("send "+r.status));}return r.json();}
  function textContent(text){var c={msgtype:"m.text",body:text};
    if(replyTarget){c["m.relates_to"]={"m.in_reply_to":{event_id:replyTarget.id}};c.body="> "+replyTarget.name+": "+replyTarget.snippet+"\n\n"+text;}return c;}
  async function uploadFile(file,filename){
    var r=await fetch(M.base+"/_matrix/media/v3/upload?filename="+encodeURIComponent(filename||file.name||"file"),{method:"POST",headers:{"Authorization":"Bearer "+M.token,"Content-Type":file.type||"application/octet-stream"},body:file});
    var d=await r.json();if(!r.ok)throw new Error(d.error||("upload "+r.status));return d.content_uri;}
  async function react(rid,tgt,key){
    var room=M.rooms[rid];var ex=room.reacts[tgt]&&room.reacts[tgt][key];
    if(ex&&ex.mine&&ex.mineEv){await fetch(C("/rooms/"+encodeURIComponent(rid)+"/redact/"+encodeURIComponent(ex.mineEv)+"/"+txn()),{method:"PUT",headers:H(),body:"{}"});}
    else{await fetch(C("/rooms/"+encodeURIComponent(rid)+"/send/m.reaction/"+txn()),{method:"PUT",headers:H(),body:JSON.stringify({"m.relates_to":{rel_type:"m.annotation",event_id:tgt,key:key}})});}
    await syncOnce(0);renderConvo(rid);}
  async function redactMsg(rid,eid){await fetch(C("/rooms/"+encodeURIComponent(rid)+"/redact/"+encodeURIComponent(eid)+"/"+txn()),{method:"PUT",headers:H(),body:"{}"});await syncOnce(0);renderConvo(rid);renderRooms();}
  var typingSent=0;
  async function sendTyping(rid,on){var now=Date.now();if(on&&now-typingSent<3000)return;typingSent=on?now:0;
    try{await fetch(C("/rooms/"+encodeURIComponent(rid)+"/typing/"+encodeURIComponent(M.userId)),{method:"PUT",headers:H(),body:JSON.stringify({typing:on,timeout:5000})});}catch(e){}}

  /* ---- media blobs (authenticated) ---- */
  var blobCache={};
  async function mediaURL(mxc){
    if(blobCache[mxc])return blobCache[mxc];
    var m=mxc.replace("mxc://","").split("/");var srv=m[0],id=m[1];
    var r=await fetch(M.base+"/_matrix/client/v1/media/download/"+srv+"/"+id,{headers:AH()});
    if(!r.ok)throw new Error("media "+r.status);var b=await r.blob();var u=URL.createObjectURL(b);blobCache[mxc]=u;return u;}

  /* ---- rendering ---- */
  function esc(s){return(s||"").replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtTime(ts){return new Date(ts).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});}
  function fmtDay(ts){var d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return"Today";var y=new Date(n-864e5);if(d.toDateString()===y.toDateString())return"Yesterday";return d.toLocaleDateString(undefined,{day:'numeric',month:'short'});}
  function initials(s){return(s||"?").trim().slice(0,2).toUpperCase();}
  function cleanBody(msg){var b=msg.body||"";if(msg.reply&&b.indexOf("> ")===0){var ix=b.indexOf("\n\n");if(ix>=0)b=b.slice(ix+2);}return b;}
  function snippet(msg){if(!msg)return"";if(msg.kind==="image")return"📷 Photo";if(msg.kind==="audio")return"🎤 Voice message";return cleanBody(msg);}

  function renderRooms(){
    var list=$("roomList");var ids=M.order.slice().sort(function(a,b){return(M.rooms[b].last||0)-(M.rooms[a].last||0);});
    if(!ids.length){list.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 15a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"/></svg><div class="h">No conversations yet</div><p>When someone starts a chat with you, it appears here.</p></div>';return;}
    var first=!M._roomsShown;var h="";ids.forEach(function(rid,idx){var r=M.rooms[rid];var last=r.order.length?r.evs[r.order[r.order.length-1]]:null;
      var prev=last?((last.sender===M.userId?"You: ":"")+snippet(last)):"Tap to open";
      h+='<div class="room'+(first?' ri':'')+'" data-rid="'+rid+'" style="animation-delay:'+(idx*45)+'ms"><div class="av">'+initials(r.display)+'</div><div class="meta"><div class="n">'+esc(r.display)+'</div><div class="p">'+esc(prev)+'</div></div><div class="t">'+(r.last?fmtTime(r.last):"")+'</div></div>';});
    list.innerHTML=h;M._roomsShown=true;list.querySelectorAll(".room").forEach(function(el){el.addEventListener("click",function(){openConvo(el.getAttribute("data-rid"));});});
  }
  function openConvo(rid){M.current=rid;var r=M.rooms[rid];$("convoName").textContent=r.display;$("viewRooms").style.display="none";var vc=$("viewConvo");vc.style.display="flex";vc.style.animation="none";void vc.offsetWidth;vc.style.animation="slideInR .3s var(--ease)";renderConvo(rid);setTimeout(function(){$("input").focus();},50);}
  function renderConvo(rid){
    var r=M.rooms[rid];if(!r)return;var el=$("convo");var h="";var lastDay="";
    r.order.forEach(function(eid){var m=r.evs[eid];if(!m)return;
      var day=fmtDay(m.ts);if(day!==lastDay){h+='<div class="daysep">'+day+'</div>';lastDay=day;}
      var me=m.sender===M.userId;var isNew=!(r._seen&&r._seen[eid]);h+='<div class="row '+(me?'me':'them')+(isNew?' new':'')+'" data-eid="'+eid+'">';
      h+='<div class="msg'+(m.deleted?' deleted':'')+'" data-eid="'+eid+'">';
      if(m.deleted){h+='🚫 This message was deleted';}
      else{
        if(!me&&r.display&&r.heroes.length!==1)h+='<div class="s">'+esc(m.name)+'</div>';
        if(m.reply){var tgt=r.evs[m.reply];h+='<div class="quote"><div class="qs">'+esc(tgt?tgt.name:"…")+'</div><div class="qb">'+esc(tgt?snippet(tgt):"message")+'</div></div>';}
        if(m.kind==="image"){h+='<img class="photo" data-mxc="'+esc(m.mxc)+'" alt="photo"/>';}
        else if(m.kind==="audio"){h+='<div class="voice" data-mxc="'+esc(m.mxc)+'"><button class="vplay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button><div class="vwave">'+Array(14).join('<i style="height:'+(6+((Math.random()*16)|0))+'px"></i>')+'</div><span class="vdur">'+fmtDur(m.info&&m.info.duration)+'</span></div>';}
        else{h+=esc(cleanBody(m));}
      }
      h+='<div class="tm">'+fmtTime(m.ts)+'</div></div>';
      // reactions
      var rc=r.reacts[eid];if(rc){var keys=Object.keys(rc);if(keys.length){h+='<div class="reacts">';keys.forEach(function(k){h+='<span class="react'+(rc[k].mine?' mine':'')+'" data-eid="'+eid+'" data-key="'+esc(k)+'">'+k+' <span class="c">'+rc[k].count+'</span></span>';});h+='</div>';}}
      h+='</div>';
    });
    if(r.typing&&r.typing.length){h+='<div class="typing"><span>'+esc(r.typing.join(", "))+' typing</span><span class="dots"><i></i><i></i><i></i></span></div>';}
    el.innerHTML=h||'<div class="daysep">Say hello 👋</div>';
    r._seen=r._seen||{};r.order.forEach(function(x){r._seen[x]=1;});
    // lazy-load media
    el.querySelectorAll("img.photo").forEach(function(img){var mxc=img.getAttribute("data-mxc");mediaURL(mxc).then(function(u){img.src=u;}).catch(function(){});});
    el.querySelectorAll(".voice .vplay").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();playVoice(b.closest(".voice"));});});
    // tap message -> action sheet
    el.querySelectorAll(".msg").forEach(function(mel){if(mel.classList.contains("deleted"))return;mel.addEventListener("click",function(){openSheet(rid,mel.getAttribute("data-eid"));});});
    el.querySelectorAll(".react").forEach(function(rl){rl.addEventListener("click",function(e){e.stopPropagation();react(rid,rl.getAttribute("data-eid"),rl.getAttribute("data-key"));});});
    var body=$("convoBody");body.scrollTop=body.scrollHeight;
  }
  function fmtDur(ms){if(!ms)return"0:07";var s=Math.round(ms/1000);return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2);}
  var curAudio=null,curVel=null;
  async function playVoice(vel){try{
    if(curVel===vel&&curAudio&&!curAudio.paused){curAudio.pause();vel.classList.remove("playing");return;}
    if(curAudio){curAudio.pause();}if(curVel)curVel.classList.remove("playing");
    var u=await mediaURL(vel.getAttribute("data-mxc"));curAudio=new Audio(u);curVel=vel;vel.classList.add("playing");
    curAudio.onended=function(){vel.classList.remove("playing");};curAudio.play();
  }catch(e){toast("Can't play audio");}}

  /* ---- action sheet ---- */
  var sheetCtx=null;
  function openSheet(rid,eid){sheetCtx={rid:rid,eid:eid};var m=M.rooms[rid].evs[eid];
    var q=$("quickReacts");q.innerHTML="";QUICK.forEach(function(k){var b=document.createElement("button");b.textContent=k;b.addEventListener("click",function(){react(rid,eid,k);closeSheet();});q.appendChild(b);});
    $("actDelete").classList.toggle("hidden",m.sender!==M.userId);
    $("actCopy").classList.toggle("hidden",m.kind!=="text");
    $("sheetBg").classList.add("on");$("sheet").classList.add("on");}
  function closeSheet(){$("sheetBg").classList.remove("on");$("sheet").classList.remove("on");sheetCtx=null;}
  $("sheetBg").addEventListener("click",closeSheet);
  $("actReply").addEventListener("click",function(){if(!sheetCtx)return;var m=M.rooms[sheetCtx.rid].evs[sheetCtx.eid];setReply(m);closeSheet();});
  $("actCopy").addEventListener("click",function(){if(!sheetCtx)return;var m=M.rooms[sheetCtx.rid].evs[sheetCtx.eid];copyText(m.body);toast("Copied");closeSheet();});
  $("actDelete").addEventListener("click",function(){if(!sheetCtx)return;redactMsg(sheetCtx.rid,sheetCtx.eid);closeSheet();});
  function copyText(t){try{if(navigator.clipboard){navigator.clipboard.writeText(t).catch(fb);}else fb();}catch(e){fb();}function fb(){var ta=document.createElement("textarea");ta.value=t;ta.style.position="absolute";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}}

  /* ---- reply ---- */
  var replyTarget=null;
  function setReply(m){replyTarget={id:m.id,name:m.name,snippet:snippet(m)};$("replyName").textContent=m.name;$("replyBody").textContent=snippet(m);$("replybar").classList.add("on");$("input").focus();}
  function clearReply(){replyTarget=null;$("replybar").classList.remove("on");}
  $("replyClose").addEventListener("click",clearReply);

  /* ---- emoji ---- */
  (function(){var p=$("emojiPanel");EMOJIS.forEach(function(e){var b=document.createElement("button");b.textContent=e;b.addEventListener("click",function(){insertEmoji(e);});p.appendChild(b);});})();
  function insertEmoji(e){var ta=$("input");ta.value+=e;ta.dispatchEvent(new Event("input"));ta.focus();}
  $("emojiBtn").addEventListener("click",function(){$("emojiPanel").classList.toggle("on");});

  /* ---- composer: send/mic swap ---- */
  var input=$("input"),sendBtn=$("sendBtn"),micBtn=$("micBtn");
  function updateComposer(){var has=input.value.trim().length>0;sendBtn.classList.toggle("hidden",!has);micBtn.classList.toggle("hidden",has);}
  input.addEventListener("input",function(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,110)+"px";updateComposer();if(M.current)sendTyping(M.current,true);});
  input.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}});
  sendBtn.addEventListener("click",doSend);
  async function doSend(){var text=input.value.trim();if(!text||!M.current)return;input.value="";input.style.height="auto";updateComposer();$("emojiPanel").classList.remove("on");var c=textContent(text);clearReply();
    try{await sendMessage(M.current,c);sendTyping(M.current,false);await syncOnce(0);renderConvo(M.current);renderRooms();}
    catch(e){toast("Couldn't send: "+e.message);input.value=text;updateComposer();}}

  /* ---- photo ---- */
  $("attachBtn").addEventListener("click",function(){$("fileInput").click();});
  $("fileInput").addEventListener("change",async function(){var f=this.files[0];this.value="";if(!f||!M.current)return;
    toast("Sending photo…");
    try{var dims=await imgDims(f);var mxc=await uploadFile(f,f.name);
      await sendMessage(M.current,{msgtype:"m.image",body:f.name||"photo.jpg",url:mxc,info:{mimetype:f.type,size:f.size,w:dims.w,h:dims.h}});
      await syncOnce(0);renderConvo(M.current);renderRooms();}catch(e){toast("Photo failed: "+e.message);}});
  function imgDims(f){return new Promise(function(res){try{var u=URL.createObjectURL(f);var i=new Image();i.onload=function(){res({w:i.naturalWidth,h:i.naturalHeight});URL.revokeObjectURL(u);};i.onerror=function(){res({w:0,h:0});};i.src=u;}catch(e){res({w:0,h:0});}});}

  /* ---- voice ---- */
  var mediaRec=null,recChunks=[],recStart=0,recTimer=null;
  micBtn.addEventListener("click",startRec);
  $("recCancel").addEventListener("click",function(){stopRec(true);});
  $("recSend").addEventListener("click",function(){stopRec(false);});
  async function startRec(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast("Recording not supported");return;}
    try{var stream=await navigator.mediaDevices.getUserMedia({audio:true});
      var mime=["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus"].find(function(m){return window.MediaRecorder&&MediaRecorder.isTypeSupported(m);})||"";
      mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);recChunks=[];
      mediaRec.ondataavailable=function(e){if(e.data.size)recChunks.push(e.data);};
      mediaRec._stream=stream;mediaRec.start();recStart=Date.now();
      $("composer").classList.add("hidden");$("recbar").classList.add("on");$("emojiPanel").classList.remove("on");
      recTimer=setInterval(function(){var s=Math.floor((Date.now()-recStart)/1000);$("recTime").textContent=Math.floor(s/60)+":"+("0"+(s%60)).slice(-2);},250);
    }catch(e){toast("Mic permission needed");}
  }
  function stopRec(cancel){
    if(!mediaRec){resetRec();return;}
    var dur=Date.now()-recStart;var mime=mediaRec.mimeType||"audio/webm";
    mediaRec.onstop=async function(){
      if(mediaRec._stream)mediaRec._stream.getTracks().forEach(function(t){t.stop();});
      resetRec();
      if(cancel||dur<400)return;
      try{var blob=new Blob(recChunks,{type:mime});blob.name="voice.webm";
        toast("Sending voice note…");var mxc=await uploadFile(blob,"voice.webm");
        await sendMessage(M.current,{msgtype:"m.audio",body:"Voice message",url:mxc,info:{mimetype:mime,size:blob.size,duration:dur},"org.matrix.msc3245.voice":{},"org.matrix.msc1767.audio":{duration:dur}});
        await syncOnce(0);renderConvo(M.current);renderRooms();
      }catch(e){toast("Voice failed: "+e.message);}
    };
    try{mediaRec.stop();}catch(e){resetRec();}
  }
  function resetRec(){clearInterval(recTimer);$("recbar").classList.remove("on");$("composer").classList.remove("hidden");$("recTime").textContent="0:00";mediaRec=null;}

  /* ---- nav ---- */
  $("convoBack").addEventListener("click",function(){M.current=null;$("viewConvo").style.display="none";$("viewRooms").style.display="flex";clearReply();renderRooms();});
  function lock(){show("weather");}$("lockBtn").addEventListener("click",lock);$("lockBtn2").addEventListener("click",lock);

  /* ---- login ---- */
  $("loginForm").addEventListener("submit",async function(e){e.preventDefault();var u=$("u").value.trim(),p=$("p").value;if(!u||!p){$("vmsg").textContent="Enter your name and passphrase.";return;}
    var btn=$("loginBtn");btn.disabled=true;btn.textContent="Unlocking…";$("vmsg").textContent="";
    try{await login(u,p);$("meName").textContent=M.userId.split(":")[0].replace("@","");await syncOnce(0);renderRooms();show("app");$("viewConvo").style.display="none";$("viewRooms").style.display="flex";updateComposer();syncLoop();$("u").value="";$("p").value="";}
    catch(err){$("vmsg").textContent=/M_FORBIDDEN|403|Invalid/i.test(err.message)?"That name or passphrase isn't right.":("Couldn't connect: "+err.message);}
    finally{btn.disabled=false;btn.textContent="Unlock";}});

  initWeather();show("weather");updateComposer();
  window.__haven={M:M,openVault:openVault};
})();
</script>
</body>
</html>
